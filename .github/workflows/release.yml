name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
      VITE_APP_TITLE: ${{ secrets.VITE_APP_TITLE || 'Portfolio' }}
      VITE_APP_DESCRIPTION: ${{ secrets.VITE_APP_DESCRIPTION || 'Portfolio website' }}
      VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.example.com' }}
      VITE_SITE_URL: ${{ secrets.VITE_SITE_URL || '' }}
      VITE_ENABLE_ANALYTICS: 'false'
      VITE_ENABLE_DEBUG: 'false'
      VITE_ENABLE_ERROR_MONITORING: 'false'
      VITE_GITHUB_URL: ${{ secrets.VITE_GITHUB_URL || 'https://github.com/example' }}
      VITE_LINKEDIN_URL: ${{ secrets.VITE_LINKEDIN_URL || 'https://linkedin.com/in/example' }}
      VITE_EMAIL: ${{ secrets.VITE_EMAIL || 'example@example.com' }}
      VITE_UMAMI_WEBSITE_ID: ${{ secrets.VITE_UMAMI_WEBSITE_ID || '' }}
      VITE_GOOGLE_ANALYTICS_ID: ${{ secrets.VITE_GOOGLE_ANALYTICS_ID || '' }}
      VITE_NEWRELIC_LICENSE_KEY: ${{ secrets.VITE_NEWRELIC_LICENSE_KEY || '' }}
      VITE_NEWRELIC_ACCOUNT_ID: ${{ secrets.VITE_NEWRELIC_ACCOUNT_ID || '' }}
      VITE_NEWRELIC_TRUST_KEY: ${{ secrets.VITE_NEWRELIC_TRUST_KEY || '' }}
      VITE_NEWRELIC_AGENT_ID: ${{ secrets.VITE_NEWRELIC_AGENT_ID || '' }}
      VITE_NEWRELIC_APPLICATION_ID: ${{ secrets.VITE_NEWRELIC_APPLICATION_ID || '' }}
      VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN || '' }}
      VITE_GITHUB_USERNAME: ${{ secrets.VITE_GITHUB_USERNAME || 'octocat' }}
      VITE_GITHUB_API_ENABLED: 'false'

    steps:
      - name: Require GitHub App config
        run: |
          if [ -z "${{ vars.CHANGESETS_APP_ID }}" ] || [ -z "${{ secrets.CHANGESETS_APP_PRIVATE_KEY }}" ]; then
            echo "::error title=Missing GitHub App config::Set CHANGESETS_APP_ID and CHANGESETS_APP_PRIVATE_KEY before running the release workflow."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create release bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CHANGESETS_APP_ID }}
          private-key: ${{ secrets.CHANGESETS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            my_portfolio
          permission-contents: write
          permission-pull-requests: write

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline=false

      - name: Create or update release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Detect release PR merge
        id: release-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          release_pr_count="$(
            gh api "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '[.[] | select(.title == "chore(release): version packages")] | length'
          )"

          if [ "${release_pr_count}" -gt 0 ]; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine current version
        id: version
        run: |
          version="$(node -p 'require("./package.json").version')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Skip if GitHub release already exists
        id: release-check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: ${{ steps.release-check.outputs.exists == 'false' && (steps.changesets.outputs.hasChangesets == 'false' || steps.release-merge.outputs.merged == 'true') }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
