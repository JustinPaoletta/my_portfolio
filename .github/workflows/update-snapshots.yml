name: Update Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test file filter (leave empty for all visual tests)'
        required: false
        default: ''
      commit_message:
        description: 'Commit message for snapshot update'
        required: false
        default: 'fix(visual): regenerate visual regression snapshots'

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Regenerate Snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    env:
      VITE_APP_TITLE: 'Portfolio'
      VITE_APP_DESCRIPTION: 'Portfolio website'
      VITE_API_URL: 'https://api.example.com'
      VITE_SITE_URL: ''
      VITE_ENABLE_ANALYTICS: 'false'
      VITE_ENABLE_DEBUG: 'false'
      VITE_ENABLE_ERROR_MONITORING: 'false'
      VITE_GITHUB_URL: 'https://github.com/example'
      VITE_LINKEDIN_URL: 'https://linkedin.com/in/example'
      VITE_EMAIL: 'example@example.com'
      VITE_UMAMI_WEBSITE_ID: ''
      VITE_GOOGLE_ANALYTICS_ID: ''
      VITE_NEWRELIC_LICENSE_KEY: ''
      VITE_NEWRELIC_ACCOUNT_ID: ''
      VITE_NEWRELIC_TRUST_KEY: ''
      VITE_NEWRELIC_AGENT_ID: ''
      VITE_NEWRELIC_APPLICATION_ID: ''
      VITE_MAPBOX_TOKEN: ''
      VITE_GITHUB_USERNAME: 'octocat'
      VITE_GITHUB_API_ENABLED: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Regenerate visual snapshots
        run: |
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            npx playwright test --project=visual-chromium --grep @visual --update-snapshots=all "${{ github.event.inputs.test_filter }}"
          else
            npx playwright test --project=visual-chromium --grep @visual --update-snapshots=all
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --name-only -- '**/*-snapshots/**' > /tmp/changed_snapshots.txt
          if [ -s /tmp/changed_snapshots.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed snapshots:"
            cat /tmp/changed_snapshots.txt
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes detected."
          fi

      - name: Commit and push updated snapshots
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '**/*-snapshots/**'
          git commit -m "${{ github.event.inputs.commit_message || 'fix(visual): regenerate visual regression snapshots' }}"
          git push
