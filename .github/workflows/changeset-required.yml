name: Release Docs Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  release-docs:
    name: Require Release Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify release docs exist
        run: |
          test -f CHANGELOG.md
          test -f RELEASE.md
          echo "Manual release process is documented in RELEASE.md."
