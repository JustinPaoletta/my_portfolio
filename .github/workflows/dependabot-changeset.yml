name: Dependabot Changeset

on:
  pull_request_target:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

jobs:
  add-changeset:
    name: Add Dependabot Changeset
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      # Pushes must not use the default GITHUB_TOKEN — that does not trigger
      # follow-up pull_request workflows on the new commit, so required checks
      # stay "waiting for status" forever. Same pattern as release.yml.
      - name: Require GitHub App config for push token
        run: |
          if [ -z "${{ vars.CHANGESETS_APP_ID }}" ] || [ -z "${{ secrets.CHANGESETS_APP_PRIVATE_KEY }}" ]; then
            echo "::error title=Missing GitHub App config::Set CHANGESETS_APP_ID and CHANGESETS_APP_PRIVATE_KEY so the changeset push triggers PR checks."
            exit 1
          fi

      - name: Create push token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CHANGESETS_APP_ID }}
          private-key: ${{ secrets.CHANGESETS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout Dependabot branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create deterministic patch changeset
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          mkdir -p .changeset
          cat > ".changeset/dependabot-pr-${PR_NUMBER}.md" <<EOF
          ---
          'my-portfolio': patch
          ---

          ${PR_TITLE}
          EOF

      - name: Commit and push changeset
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if git diff --quiet -- .changeset && [ -z "$(git ls-files --others --exclude-standard .changeset)" ]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ".changeset/dependabot-pr-${PR_NUMBER}.md"
          git commit -m "chore(changeset): add dependabot changeset for #${PR_NUMBER}"
          git push
