# Dependabot is intentionally limited to security remediation PRs.
# Setting `open-pull-requests-limit: 0` disables routine version-update PRs
# while still allowing Dependabot security updates for each ecosystem.

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      # GitHub still requires a schedule block even when version updates are disabled.
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    groups:
      npm-security-updates:
        applies-to: 'security-updates'
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'dependabot'
    # Disable routine version-update PRs. Security PRs still open outside this limit.
    open-pull-requests-limit: 0
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    reviewers:
      - 'JustinPaoletta'
    assignees:
      - 'JustinPaoletta'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      # GitHub still requires a schedule block even when version updates are disabled.
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    groups:
      github-actions-security-updates:
        applies-to: 'security-updates'
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'dependabot'
      - 'github-actions'
    # Disable routine version-update PRs. Security PRs still open outside this limit.
    open-pull-requests-limit: 0
    commit-message:
      prefix: 'ci'
      include: 'scope'
