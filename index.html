<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tab favicon -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/branding/JP-no-cursor.svg?v=2" />
    <!-- PNG favicons (48x48 recommended by Google for search results) -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicons/favicon-48x48.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicons/pwa-192x192.png?v=2" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicons/pwa-512x512.png?v=2" />
    <!-- Apple Touch Icons (iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png?v=2" />
    <link rel="apple-touch-icon" sizes="512x512" href="/favicons/pwa-512x512.png?v=2" />
    <!-- Shortcut icon for older browsers -->
    <link rel="shortcut icon" type="image/svg+xml" href="/branding/JP-no-cursor.svg?v=2" />

    <!-- Microsoft Windows Tiles -->
    <meta name="msapplication-TileColor" content="#1a1918" />
    <meta name="msapplication-TileImage" content="/favicons/pwa-192x192.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />

    <!-- CSP is set via HTTP headers in vercel.json -->

    <title>JP Engineering</title>
    <meta
      name="description"
      content="My personal portfolio showcasing my work and skills"
    />
    <meta name="theme-color" content="#1a1918" />

    <!-- Preload LCP image for CLI theme -->
    <link rel="preload" as="image" href="/images/hero/dew/dew-text.webp" fetchpriority="high" />

    <!-- Preload cosmic theme video when user's saved theme is cosmic (instant playback) -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('portfolio-theme') === 'cosmic') {
            var link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'video';
            link.href = '/video/cosmos.mp4';
            document.head.appendChild(link);
          }
        } catch (e) {}
      })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;700&family=Inter:wght@400;500;600&family=Orbitron:wght@700;900&family=VT323&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <!--
      Open Graph & Twitter Card Meta Tags
      =====================================
      These tags are defined here in index.html because social media crawlers
      (Facebook, Twitter/X, LinkedIn, etc.) do NOT execute JavaScript.
      They only read the raw HTML served by the server.

      The SEO component (src/components/SEO.tsx) also defines these tags for:
      - Google (which does execute JavaScript)
      - Dynamic page updates during client-side navigation
      - Future SSR/SSG compatibility

      If you update these values, also update src/components/SEO.tsx and src/config/seo.ts
    -->

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jpengineering.dev" />
    <meta property="og:title" content="JP Engineering" />
    <meta
      property="og:description"
      content="My personal portfolio showcasing my work and skills"
    />
    <meta
      property="og:image"
      content="https://jpengineering.dev/og/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://jpengineering.dev" />
    <meta name="twitter:title" content="JP Engineering" />
    <meta
      name="twitter:description"
      content="My personal portfolio showcasing my work and skills"
    />
    <meta
      name="twitter:image"
      content="https://jpengineering.dev/og/og-image.png"
    />

    <!-- Umami Analytics - injected at runtime from env config -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
