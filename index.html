    <!-- Apply persisted theme attributes before React mounts -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var params = new URLSearchParams(window.location.search);
          var defaultTheme = 'minimal';
          var defaultMode = 'system';
          var normalizeTheme = function (value) {
            return value && /^(engineer|cosmic|cli|minimal)$/.test(value)
              ? value
              : null;
          };
          var normalizeMode = function (value) {
            return value === 'dark' || value === 'light' || value === 'system'
              ? value
              : null;
          };
          var isVisualTest = params.get('visual-test') === '1';
          if (isVisualTest) {
            root.dataset.visualTest = 'true';
          }

          var queryTheme = normalizeTheme(params.get('theme'));
          if (queryTheme) {
            localStorage.setItem('portfolio-theme', queryTheme);
          }

          var storedTheme = localStorage.getItem('portfolio-theme');
          var resolvedTheme = queryTheme || normalizeTheme(storedTheme);

          if (!resolvedTheme) {
            resolvedTheme = defaultTheme;
          }

          var queryMode = normalizeMode(params.get('mode'));
          if (queryMode) {
            localStorage.setItem('portfolio-color-mode', queryMode);
          }

          var storedMode = localStorage.getItem('portfolio-color-mode');
          var configuredMode =
            queryMode || normalizeMode(storedMode) || defaultMode;
          var resolvedMode =
            configuredMode === 'dark' || configuredMode === 'light'
              ? configuredMode
              : window.matchMedia &&
                  window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';

          root.dataset.theme = resolvedTheme;

          root.dataset.colorMode = resolvedMode;

          var bgByTheme = {
            engineer: { dark: '#0a0e12', light: '#f0f8ff' },
            cosmic: { dark: '#0b0014', light: '#fdf8ff' },
            cli: { dark: '#0a0f0a', light: '#f5fff5' },
            minimal: { dark: '#0f1115', light: '#f7f7f5' },
          };

          var bg = bgByTheme[resolvedTheme][resolvedMode];

          root.style.setProperty('--bg-main', bg);
          root.style.backgroundColor = bg;
          if (document.body) {
            document.body.style.backgroundColor = bg;
          } else {
            document.addEventListener(
              'DOMContentLoaded',
              function () {
                if (document.body) {
                  document.body.style.backgroundColor = bg;
                }
              },
              { once: true }
            );
          }

          var preloadAsset = function (as, href, fetchpriority, type) {
            var link = document.createElement('link');
            link.rel = 'preload';
            link.as = as;
            link.href = href;
            if (type) {
              link.type = type;
            }
            if (fetchpriority) {
              link.setAttribute('fetchpriority', fetchpriority);
            }
            document.head.appendChild(link);
          };

          if (resolvedTheme === 'cosmic') {
            preloadAsset(
              'image',
              '/images/hero/cosmic/cosmos-first-frame.webp',
              'high'
            );
            preloadAsset('video', '/video/cosmos.mp4', 'high', 'video/mp4');
          }
        } catch (e) {}
      })();
    </script>
