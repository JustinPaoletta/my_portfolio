<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Stable crawler-facing favicon URL -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <!-- Modern SVG favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      sizes="any"
      href="/branding/JP-no-cursor.svg"
    />
    <!-- PNG favicons (48x48 recommended by Google for search results) -->
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="/favicons/favicon-48x48.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/favicons/pwa-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/favicons/pwa-512x512.png"
    />
    <!-- Apple Touch Icons (iOS home screen) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicons/apple-touch-icon.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="512x512"
      href="/favicons/pwa-512x512.png"
    />

    <!-- Microsoft Windows Tiles -->
    <meta name="msapplication-TileColor" content="#1a1918" />
    <meta name="msapplication-TileImage" content="/favicons/pwa-192x192.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />

    <!-- CSP is set via HTTP headers in vercel.json -->

    <title>JP Engineering</title>
    <meta
      name="description"
      content="I turn evolving business requirements into high-quality software delivered with precision and consistency."
    />
    <meta name="theme-color" content="#1a1918" />

    <!-- Preload LCP image for CLI theme -->
    <link
      rel="preload"
      as="image"
      href="/images/hero/dew/dew-text.webp"
      fetchpriority="high"
    />

    <!-- Apply persisted theme attributes before React mounts -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var params = new URLSearchParams(window.location.search);
          var defaultTheme = 'minimal';
          var defaultMode = 'system';
          var themeAliases = {
            dewTheDew: 'cli',
          };
          var normalizeTheme = function (value) {
            if (!value) {
              return null;
            }

            var normalized = themeAliases[value] || value;
            return /^(engineer|cosmic|cli|minimal)$/.test(normalized)
              ? normalized
              : null;
          };
          var normalizeMode = function (value) {
            return value === 'dark' || value === 'light' || value === 'system'
              ? value
              : null;
          };
          var queryTheme = normalizeTheme(params.get('theme'));
          if (queryTheme) {
            localStorage.setItem('portfolio-theme', queryTheme);
          }

          var storedTheme = localStorage.getItem('portfolio-theme');
          var resolvedTheme = queryTheme;
          if (!resolvedTheme) {
            var normalizedStoredTheme = normalizeTheme(storedTheme);
            if (normalizedStoredTheme) {
              if (storedTheme !== normalizedStoredTheme) {
                localStorage.setItem('portfolio-theme', normalizedStoredTheme);
              }
              resolvedTheme = normalizedStoredTheme;
            }
          }

          if (!resolvedTheme) {
            resolvedTheme = defaultTheme;
          }

          var queryMode = normalizeMode(params.get('mode'));
          if (queryMode) {
            localStorage.setItem('portfolio-color-mode', queryMode);
          }

          var storedMode = localStorage.getItem('portfolio-color-mode');
          var configuredMode =
            queryMode || normalizeMode(storedMode) || defaultMode;
          var resolvedMode =
            configuredMode === 'dark' || configuredMode === 'light'
              ? configuredMode
              : window.matchMedia &&
                  window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';

          root.dataset.theme = resolvedTheme;

          root.dataset.colorMode = resolvedMode;

          var bgByTheme = {
            engineer: { dark: '#0a0e12', light: '#f0f8ff' },
            cosmic: { dark: '#0b0014', light: '#fdf8ff' },
            cli: { dark: '#0a0f0a', light: '#f5fff5' },
            minimal: { dark: '#0f1115', light: '#f7f7f5' },
          };

          var bg = bgByTheme[resolvedTheme][resolvedMode];

          root.style.setProperty('--bg-main', bg);
          root.style.backgroundColor = bg;
          if (document.body) {
            document.body.style.backgroundColor = bg;
          }
        } catch (e) {}
      })();
    </script>

    <!--
      Open Graph & Twitter Card Meta Tags
      =====================================
      These tags are defined here in index.html because social media crawlers
      (Facebook, Twitter/X, LinkedIn, etc.) do NOT execute JavaScript.
      They only read the raw HTML served by the server.

      The SEO component (src/components/SEO.tsx) also defines these tags for:
      - Google (which does execute JavaScript)
      - Dynamic page updates during client-side navigation
      - Future SSR/SSG compatibility

      If you update these values, also update src/content/site.ts and src/config/seo.ts
    -->

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jpengineering.dev" />
    <meta property="og:title" content="JP Engineering" />
    <meta
      property="og:description"
      content="I turn evolving business requirements into high-quality software delivered with precision and consistency."
    />
    <meta
      property="og:image"
      content="https://jpengineering.dev/og/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://jpengineering.dev" />
    <meta name="twitter:title" content="JP Engineering" />
    <meta
      name="twitter:description"
      content="I turn evolving business requirements into high-quality software delivered with precision and consistency."
    />
    <meta
      name="twitter:image"
      content="https://jpengineering.dev/og/og-image.png"
    />

    <!-- Umami Analytics - injected at runtime from env config -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
